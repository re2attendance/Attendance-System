name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test --passWithNoTests

      # Build needs the public env vars present. These are not secrets — the
      # publishable key is safe to expose because RLS is the real boundary — but
      # they live in repo variables rather than the tree so staging/prod can differ.
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_UNIVERSITY_EMAIL_DOMAIN: ${{ vars.NEXT_PUBLIC_UNIVERSITY_EMAIL_DOMAIN }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

  # Supabase Branching applies migrations to the production database the moment they
  # land on `main`, so the pull request is the only place to intercept anything (D-059).
  # Cheap and dependency-free on purpose: it needs an answer in seconds, long before the
  # database job has finished starting Postgres.
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # The guard diffs against the merge base, which a shallow clone does not have.
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          # setup-node reads `packageManager` from package.json and goes looking for
          # pnpm to populate its cache. This job installs nothing, so pnpm is not here
          # and the lookup fails the step before the guard ever runs.
          package-manager-cache: false

      # Called directly rather than through pnpm: the script uses only node builtins,
      # so this job needs no install step at all.
      - name: Migration guard
        run: node scripts/check-migrations.mjs

  # The security boundary is in the database, so it is tested in a database. This
  # job stands up the real local stack, applies every migration from scratch, and
  # runs the pgTAP suite as the `authenticated` role — the same role a browser
  # holding the publishable key gets.
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start Supabase
        run: pnpm db:start

      - name: Apply migrations from scratch
        run: pnpm db:reset

      - name: Database tests
        run: pnpm db:test
